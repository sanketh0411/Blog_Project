{% extends 'base.html' %}

{% block content %}
<h2>Edit Blog</h2>

<form method="POST">
    {% csrf_token %}
    <div>
        <input type="text" name="title" value="{{ blog.title }}">
    </div>
    <div>
        <textarea name="content">{{ blog.content }}</textarea>
    </div>
    <div>
        <button>Update</button>
    </div>
</form>
{% endblock %}
